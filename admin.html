<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LoveBox ❤️</title>

<style>

body{

    background:#ffb6c1;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    margin:0;

}

.container{

    background:white;

    padding:30px;

    border-radius:20px;

    width:90%;

    max-width:400px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

}

h1{

    color:#ff4081;

}

textarea{

    width:100%;

    height:120px;

    border-radius:10px;

    padding:10px;

    font-size:16px;

}

button{

    margin-top:15px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#ff4081;

    color:white;

    font-size:18px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

    <h1>❤️ LoveBox ❤️</h1>

    <textarea id="message"

    placeholder="Type your message..."></textarea>

    <button onclick="sendMessage()">

        SEND 💌

    </button>

    <p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getDatabase,

  ref,

  set

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCVe6dheTmL-ERnt2DkXVaD_oBzGXXMECs",

  authDomain: "lovebox-e57dc.firebaseapp.com",

  databaseURL: "https://lovebox-e57dc-default-rtdb.firebaseio.com",

  projectId: "lovebox-e57dc",

  storageBucket: "lovebox-e57dc.firebasestorage.app",

  messagingSenderId: "913870168307",

  appId: "1:913870168307:web:d012bad0e84b765c715786"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

window.sendMessage = function() {

  const msg = document.getElementById("message").value;

  set(ref(db, "message"), msg)

    .then(() => {

      document.getElementById("status").innerHTML =

      "Message sent ❤️";

      document.getElementById("message").value = "";

    })

    .catch((error) => {

      document.getElementById("status").innerHTML =

      error;

    });

};

</script>
</body>

</html>
