<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My LoveBox ❤️</title>

<style>

body{

    background:#ffb6c1;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    margin:0;

}

.container{

    background:white;

    padding:30px;

    border-radius:20px;

    width:90%;

    max-width:400px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

}

h1{

    color:#ff4081;

}

h3{

    color:#333;

}

button{

    margin-top:15px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#ff4081;

    color:white;

    font-size:18px;

    cursor:pointer;

}

#lightBtn{

    font-size:22px;

    font-weight:bold;

}

input[type="range"]{

    width:100%;

}

#status{

    margin-top:15px;

    color:#ff4081;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<img

src="logo.png"

alt="LoveBox Logo"

style="

width:220px;

display:block;

margin:0 auto 15px auto;

">

<h2 style="color:#ff4081;">

My LoveBox ❤️

</h2>

<h3>💡 Night Light</h3>

<button id="lightBtn" onclick="toggleLight()">

🔴 OFF

</button>

<h3>☀️ Brightness</h3>

<input

type="range"

min="0"

max="255"

value="130"

id="brightness">

<button onclick="updateLight()">

Apply ❤️

</button>

<button onclick="missHim()" style="background:#ff7aa2;">

🥺 Touch if you miss him

</button>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getDatabase,

  ref,

  update

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyCVe6dheTmL-ERnt2DkXVaD_oBzGXXMECs",

  authDomain: "lovebox-e57dc.firebaseapp.com",

  databaseURL: "https://lovebox-e57dc-default-rtdb.firebaseio.com",

  projectId: "lovebox-e57dc",

  storageBucket: "lovebox-e57dc.firebasestorage.app",

  messagingSenderId: "913870168307",

  appId: "1:913870168307:web:d012bad0e84b765c715786"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

let lightState = false;

window.toggleLight = function(){

    lightState = !lightState;

    const btn = document.getElementById("lightBtn");

    if(lightState){

        btn.innerHTML = "🟢 ON";

    }else{

        btn.innerHTML = "🔴 OFF";

    }

};

window.updateLight = function(){

    update(ref(db,"/"),{

        light: lightState,

        brightness: parseInt(

            document.getElementById("brightness").value

        )

    })

    .then(()=>{

        document.getElementById("status").innerHTML =

        "LoveBox updated ❤️";

    })

    .catch((error)=>{

        document.getElementById("status").innerHTML =

        error;

    });

};

window.missHim = function(){

    update(ref(db,"/"),{

        miss_him:true

    })

    .then(()=>{

        document.getElementById("status").innerHTML =

        "A little signal was sent ❤️";

    })

    .catch((error)=>{

        document.getElementById("status").innerHTML =

        error;

    });

};

</script>

</body>

</html>
