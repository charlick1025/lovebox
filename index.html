<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LoveBox ❤️</title>

<style>

body{

    background:#ffb6c1;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

    margin:0;

}

.container{

    background:white;

    padding:30px;

    border-radius:20px;

    width:90%;

    max-width:400px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,0.2);

}

h1{

    color:#ff4081;

}

textarea{

    width:100%;

    height:120px;

    border-radius:10px;

    padding:10px;

    font-size:16px;

}

button{

    margin-top:15px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#ff4081;

    color:white;

    font-size:18px;

    cursor:pointer;

}

</style>

</head>

<body>

<div class="container">

    <h1>❤️ LoveBox ❤️</h1>

    <textarea id="message"

    placeholder="Type your message..."></textarea>

    <button onclick="sendMessage()">

        SEND 💌

    </button>

    <p id="status"></p>

</div>

<script>

function sendMessage(){

    document.getElementById("status").innerHTML =

    "Firebase not connected yet";

}

</script>

</body>

</html>
